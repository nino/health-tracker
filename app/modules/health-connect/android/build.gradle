plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.healthconnect'
version = '0.1.0'

dependencies {
  implementation "androidx.health.connect:connect-client:1.1.0"
}

android {
  namespace "expo.modules.healthconnect"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}
